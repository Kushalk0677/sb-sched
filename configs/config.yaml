# configs/config.yaml
#
# Set dataset root paths to your local copies of each dataset.
# Relative paths are resolved from the project root.
# Use forward slashes even on Windows.
#
# EuRoC:  https://projects.asl.ethz.ch/datasets/euroc-mav/
# KITTI:  https://www.cvlibs.net/datasets/kitti/raw_data.php
# TUM-VI: https://vision.in.tum.de/data/datasets/visual-inertial-dataset

datasets:
  euroc:
    root: "D:/data/euroc"
  kitti:
    root: "D:/data/kitti_raw"
  tumvi:
    root: "D:/data/tumvi"

experiments:
  p_max_multiplier: 3.0
  p_max_sweep: [1.5, 2.0, 3.0, 5.0, 10.0]
  rate_asymmetry_factors: [10, 20]
  random_seed: 42
  results_dir: "results/"

baselines:
  heuristic:
    up_threshold: 1.5
    down_threshold: 0.5
  event_trigger:
    innovation_threshold: 3.0
  aoi_min:
    max_age: 10
  whittle:
    discount: 0.99
  cd_kf:
    lr: 1.0e-3
    n_steps: 500
  periodic_opt:
    grid_points: 20